name: CI

# The repository had no CI. Nothing ran on a pull request, so a change that broke the
# typecheck or the credential logic could be merged with nobody the wiser -- which is also
# why `npm test` had been pointing at an uninstalled jest since the repo was created and
# nobody had tripped over it.
#
# Everything here is hermetic: no database, no network. The official W3C suite needs a live
# server and is therefore opt-in (`npm run test:w3c`); see test/w3c/README.md, which is
# explicit about what we do and do not run here.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, conformance, and end-to-end checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Prisma client is generated code, and the Nest layer will not typecheck without
      # it. Generating it needs no database connection.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: W3C conformance (VC Data Model 2.0, Bitstring Status List, Data Integrity)
        run: npm run test:conformance

      - name: Core smoke test
        run: npm run smoke

      - name: OpenID4VCI issuance (drives the full flow as a wallet)
        run: npm run smoke:oid4vci

      - name: OpenID4VP presentation (drives the flow, and the attacks it must reject)
        run: npm run smoke:oid4vp

      # These two were in `npm test` but never in CI, so nothing gated them. The SSO suite
      # is the one that matters most: it exists to hold down the regression where naming an
      # existing residency ID -- a semi-public value -- was enough to sign in as that
      # person. A guard with no test in front of it is a guard waiting to be refactored out.
      - name: SSO login factors (VP primary, one-time code fallback, and their attacks)
        run: npm run smoke:sso

      - name: Foundational sources (XML/SOAP and imported dataset adapters)
        run: npm run smoke:sources

  build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The runtime image must carry contexts/, or JSON-LD issuance fails at RUN time with
      # a missing-context error rather than at build time. Building it here keeps that
      # from regressing.
      - name: Build container image
        run: docker build -t open-residency:ci .
