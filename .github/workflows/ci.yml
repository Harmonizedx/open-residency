name: CI

# The repository had no CI. Nothing ran on a pull request, so a change that broke the
# typecheck or the credential logic could be merged with nobody the wiser -- which is also
# why `npm test` had been pointing at an uninstalled jest since the repo was created and
# nobody had tripped over it.
#
# Everything here is hermetic: no database, no network. The official W3C suite needs a live
# server and is therefore opt-in (`npm run test:w3c`); see test/w3c/README.md, which is
# explicit about what we do and do not run here.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, conformance, and end-to-end checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Prisma client is generated code, and the Nest layer will not typecheck without
      # it. Generating it needs no database connection.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: W3C conformance (VC Data Model 2.0, Bitstring Status List, Data Integrity)
        run: npm run test:conformance

      - name: Core smoke test
        run: npm run smoke

      - name: OpenID4VCI issuance (drives the full flow as a wallet)
        run: npm run smoke:oid4vci

      # Inji Draft-13 profile conformance: a wallet behaving exactly as Inji's documented
      # client does, asserting each accommodation AND that each is load-bearing (the
      # c_nonce="null" failure the cNonceInAccessToken flag prevents). Conformance to
      # documented behavior, not the live app -- see docs/INTEROP.md.
      - name: Inji Draft-13 conformance
        run: npm run smoke:inji

      - name: OpenID4VP presentation (drives the flow, and the attacks it must reject)
        run: npm run smoke:oid4vp

      # These two were in `npm test` but never in CI, so nothing gated them. The SSO suite
      # is the one that matters most: it exists to hold down the regression where naming an
      # existing residency ID -- a semi-public value -- was enough to sign in as that
      # person. A guard with no test in front of it is a guard waiting to be refactored out.
      - name: SSO login factors (VP primary, one-time code fallback, and their attacks)
        run: npm run smoke:sso

      # Cross-issuer federation: a credential from a federated peer state verifies here,
      # an unlisted issuer is rejected as UNTRUSTED_ISSUER, and peer key rotation is safe.
      - name: Federation (cross-issuer trust)
        run: npm run smoke:federation

      # WebAuthn passkey factor (registration + assertion verification against a simulated
      # authenticator, both ES256 and EdDSA) and the assurance model (acr/amr, biometric
      # step-up). Security-critical crypto, so it is gated.
      - name: WebAuthn step-up factor and assurance model
        run: npm run smoke:webauthn

      # WebAuthn service flow: registration (authorized by an existing factor),
      # authentication, and the challenge-lifecycle guards (single-use, time/purpose/
      # resident-bound). The HTTP endpoints + real passkey enroll/login are exercised in the
      # Postgres e2e job.
      - name: WebAuthn registration/authentication flow
        run: npm run smoke:webauthn-service

      # Boots the real oidc-provider from buildOidcConfiguration and drives a full
      # Authorization Code + PKCE flow. This is the suite that catches OIDC client/config
      # defects (id_token alg, pairwise subjectTypes) which are invisible until the
      # provider actually runs. Still hermetic -- no database.
      - name: SSO OIDC flow (real provider, Authorization Code + PKCE)
        run: npm run smoke:sso-oidc

      - name: Foundational sources (XML/SOAP and imported dataset adapters)
        run: npm run smoke:sources

  sso-e2e:
    name: Full-stack SSO (real NestJS app + Postgres)
    runs-on: ubuntu-latest
    # This is the only job with a database, and it exists for one reason: to boot the
    # ACTUAL application. Every other job is hermetic core logic that never calls
    # NestFactory.create(AppModule) -- which is exactly how a dependency-injection defect
    # once left the whole app unable to start while CI stayed green. This job drives a real
    # "Sign in with the State" flow through the real InteractionController, so a boot
    # failure or a broken interaction fails the build instead of shipping.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: openres_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/openres_e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to the service database
        run: npx prisma db push --skip-generate

      - name: Build the application
        run: npm run build

      - name: Drive the real app end-to-end (boot, login, consent, tokens)
        run: node scripts/sso-nest-e2e.cjs

  build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The runtime image must carry contexts/, or JSON-LD issuance fails at RUN time with
      # a missing-context error rather than at build time. Building it here keeps that
      # from regressing.
      - name: Build container image
        run: docker build -t open-residency:ci .
