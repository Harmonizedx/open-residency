# India - Aadhaar as the foundational identity (OTP-based auth).
# Demonstrates a two-step provider: the platform requests an OTP, the resident
# receives it on their registered mobile, then verify() is called with the OTP.

countryCode: IN
countryName: India
defaultSubnationalUnit: KA

foundational:
  provider: IN_AADHAAR
  baseUrl: https://auth.example.in
  timeoutMs: 8000
  auth:
    type: bearer
    secretEnv: AADHAAR_API_TOKEN
  inputs:
    - { key: aadhaar, label: Aadhaar Number, pattern: '^\d{12}$' }
    - { key: otp, label: OTP, required: false, secret: true }
  request:
    method: POST
    path: /v2/auth
    bodyTemplate:
      uid: '{identifiers.aadhaar}'
      otp: '{identifiers.otp}'
      txn: '{context.challengeRef}'
  verifiedFlag: { path: authResult, equals: 'y' }
  responseMapping:
    givenName: kyc.name
    dateOfBirth: kyc.dob
    gender: kyc.gender
  assuranceOnSuccess: high
  # The OTP is delivered to the mobile registered against the Aadhaar number, so passing
  # this check authenticates the OWNER, not merely the existence of the record. The adapter
  # therefore attests `authoritative_authentication` binding on success.
  authenticatesApplicant: true

residency:
  minAssurance: verified
  proofOfResidence: document
  allowProvisional: false
  # Refuse issuance unless the applicant was bound to the identity. Aadhaar OTP satisfies
  # this via authoritative_authentication; an assisted desk could also bind in person.
  applicantBinding:
    required: true
    acceptedMethods: [authoritative_authentication, attended_comparison]

credential:
  issuerDid: did:web:residency.karnataka.gov.in
  issuerName: Karnataka Residency Directorate
  type: StateResidencyCredential
  validityDays: 1825
  context:
    - https://www.w3.org/ns/credentials/v2

subnationalUnits:
  - { code: KA, name: Karnataka, parent: IN, level: state }
