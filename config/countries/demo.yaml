# Demo jurisdiction - MOCK foundational provider.
#
# Wire this up to run the ENTIRE stack (issue -> credential -> SSO -> verify) with no
# live national ID API. Any identifier whose primary value ends in an even digit
# verifies. Never enable a MOCK config in production.

countryCode: ZZ
countryName: Demoland
defaultSubnationalUnit: DX

foundational:
  provider: MOCK
  inputs:
    - { key: nationalId, label: National ID (even last digit = verifies in demo) }
  assuranceOnSuccess: verified

residency:
  minAssurance: verified
  proofOfResidence: attestation
  allowProvisional: true
  # Applicant->identity binding is RECORDED on every credential regardless; here it is not
  # REQUIRED, so the full stack runs end-to-end from a browser with no operator step. The
  # MOCK provider is a bare lookup and attests no binding, so credentials issued here carry
  # `applicantBinding.method: none` -- which is exactly the point: a demo lookup is not owner
  # proof. A real deployment sets required: true (see ng.yaml / in.yaml). To simulate an
  # owner-authenticating source instead, set foundational.authenticatesApplicant: true.
  applicantBinding:
    required: false
    acceptedMethods: [authoritative_authentication, face_match, attended_comparison]

credential:
  issuerDid: did:web:id.demoland.example
  issuerName: Demoland Residency Authority
  type: StateResidencyCredential
  validityDays: 365
  context:
    - https://www.w3.org/ns/credentials/v2

subnationalUnits:
  - { code: DX, name: Demo District, parent: ZZ, level: state }

# ---------------------------------------------------------------------------
# Wallet interoperability profile (OpenID4VCI). OPTIONAL.
#
# Every value below is the default, spelled out here so the trade-offs are visible. Omit
# this whole block and you get exactly this. The defaults are the WIDEST possible surface,
# so that the hardest real wallet -- MOSIP's Inji, still on Draft 13 and hardcoding RS256 --
# works with no tuning.
#
# None of this is Inji-specific: the code speaks the standards and sniffs no wallet. But
# width has a cost, and a deployment should be able to decline to pay it. See docs/INTEROP.md.
# ---------------------------------------------------------------------------
wallet:
  # ldp_vc is what wallets accept (Inji REJECTS jwt_vc_json outright).
  # jwt_vc_json is compact, needs no canonicalization, and fits in a printed QR -- it is
  # the offline path. Most deployments want both.
  formats: [ldp_vc, jwt_vc_json]

  # RS256 is accepted ONLY because Inji hardcodes it. Drop it once your wallets have moved
  # on; EdDSA keeps credentials small, which is what makes the QR code scannable.
  proofAlgs: [EdDSA, ES256, RS256]

  compatibility:
    # Accept the OpenID4VCI Draft 13 wire format as well as 1.0. Turning this off narrows
    # the request surface we accept, which is a security improvement -- do it as soon as
    # every wallet you serve is on 1.0.
    draft13: true
    # Duplicate c_nonce/client_id into the access token. This is in NO version of the spec;
    # Inji reads the nonce from inside the token rather than from the response body. If you
    # do not serve Inji, set this false rather than emit a non-standard claim for nobody.
    cNonceInAccessToken: true

  offer:
    ttlSeconds: 900        # a citizen scanning a QR at a desk: minutes, not hours
    txCodeLength: 6        # the spoken second factor; NOT carried in the QR
    maxTxCodeAttempts: 5   # a short numeric PIN is only safe if guesses are bounded

  accessTokenTtlSeconds: 600
  nonceTtlSeconds: 300

# Presentation profile (OpenID4VP). Deployment-wide: a presentation request names no country,
# so this is read from the default (first) country config.
presentation:
  requestTtlSeconds: 300
  # DCQL is OpenID4VP 1.0; presentation_definition is Presentation Exchange, which wallets
  # mid-migration still use. Emitting both means not having to guess which a wallet speaks.
  query: [dcql, presentation_definition]

# ---------------------------------------------------------------------------
# Sign-in relying parties (OpenID Connect). OPTIONAL.
#
# These are the sector services that authenticate citizens through this residency IdP --
# "Sign in with <State>". They never see the national ID, only the residency claims the
# citizen consents to release. Each RP is entitled to exactly one sector scope.
#
# Previously this list was hardcoded in TypeScript, which made a relying party the one
# thing about a country that needed a code change. It is now config, like everything else.
#
# The client SECRET is never here: it is read from <CLIENT_ID>_CLIENT_SECRET in the
# environment (e.g. HEALTH_CLIENT_SECRET). The app refuses to start if one is missing.
#
# Note `scopes` on each RP. `residency` releases resident_id -- the same value at every
# service -- so it is granted only where there is a reason to hold the number itself.
# Health and Permits get `profile` and their sector scope and can read the assurance
# claims without ever seeing the residency number.
# ---------------------------------------------------------------------------
oidc:
  # Each RP sees a different `sub` for the same citizen, so two services cannot join
  # their records on it.
  subjectType: pairwise
  relyingParties:
    - clientId: health
      name: Demoland Health Service
      sector: health
      scopes: [profile]
      redirectUris: [http://localhost:4001/callback]
      postLogoutRedirectUris: [http://localhost:4001]
    - clientId: tax
      name: Demoland Revenue Authority
      sector: tax
      # Statutory basis for holding the residency number itself.
      scopes: [profile, residency]
      redirectUris: [http://localhost:4002/callback]
      postLogoutRedirectUris: [http://localhost:4002]
    - clientId: permits
      name: Demoland Permits Office
      sector: permits
      scopes: [profile]
      redirectUris: [http://localhost:4003/callback]
      postLogoutRedirectUris: [http://localhost:4003]
    - clientId: subsidy
      name: Demoland Subsidy Program
      sector: subsidy
      scopes: [profile, residency]
      redirectUris: [http://localhost:4004/callback]
      postLogoutRedirectUris: [http://localhost:4004]

# ---------------------------------------------------------------------------
# Operator authentication (deployment-wide; read from the default country config)
# ---------------------------------------------------------------------------
# The demo runs `local` so it works with no external IdP: operator accounts live in
# Postgres with scrypt passwords and TOTP. Bootstrap the first admin by setting
# OPERATOR_BOOTSTRAP_EMAIL and OPERATOR_BOOTSTRAP_PASSWORD -- the TOTP secret is logged
# once, on the boot that creates it.
#
# A real deployment should use `oidc` instead, so staff identity, MFA and de-provisioning
# stay in the ministry's directory and this system holds no staff credentials:
#
#   operatorAuth:
#     mode: oidc
#     oidc:
#       issuer: https://login.katsina.gov.ng/realms/staff
#       audience: openresidency
#       roleClaim: realm_access.roles
#       roleMap:
#         REGISTRY_CLERK: registrar
#         REGISTRY_SUPERVISOR: revoker
#         INTERNAL_AUDIT: auditor
#
# The demo ships `sharedKey` so the quickstart in the README works with nothing but
# ADMIN_API_KEY set. It is the weakest mode and warns loudly on every boot: no operator
# identity, no roles, no rotation. Do not carry it into a real deployment.
#
# To try real operator accounts locally, switch mode to `local` and set
# OPERATOR_BOOTSTRAP_EMAIL / OPERATOR_BOOTSTRAP_PASSWORD -- the first admin is created on
# the next boot and its TOTP secret is logged once:
#
#   operatorAuth:
#     mode: local
#     issuerName: Demoland Residency
#     local:
#       requireMfa: true
operatorAuth:
  mode: sharedKey
  issuerName: Demoland Residency

# ---------------------------------------------------------------------------
# Messaging and contact directory
# ---------------------------------------------------------------------------
# The demo uses the LOG provider, which prints codes instead of sending them, and has to
# say so explicitly -- the acknowledgement is what stops this block being copied into a
# real deployment unnoticed.
#
# A real deployment picks an aggregator. Any of these works without a code change:
#
#   messaging:
#     provider: AFRICASTALKING       # secret in AFRICASTALKING_API_KEY
#     sender: your-at-username
#   messaging:
#     provider: TERMII               # secret in TERMII_API_KEY
#     sender: Katsina
#   messaging:
#     provider: TWILIO               # TWILIO_ACCOUNT_SID + TWILIO_AUTH_TOKEN
#     sender: ACxxxxxxxx             # the Account SID, used in the path
#   messaging:
#     provider: GENERIC_HTTP         # any aggregator with a REST endpoint
#     baseUrl: https://sms.example.ng
#     sender: Katsina
#     auth: { type: bearer, secretEnv: SMS_GATEWAY_TOKEN }
#     request:
#       method: POST
#       path: /v1/messages
#       bodyTemplate: { to: '{to}', from: '{sender}', text: '{body}' }
#       messageIdPath: data.id
#       successFlag: { path: status, equals: accepted }
messaging:
  provider: LOG
  acknowledgeInsecureLogProvider: true

# Where a resident's number comes from at send time. `none` means OTP delivery is off.
# `encrypted` stores the number AES-256-GCM under CONTACT_ENCRYPTION_KEY; `external`
# resolves it from a contact service the ministry already runs and stores nothing here.
contactDirectory:
  mode: none
