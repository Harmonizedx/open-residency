replicaCount: 2

image:
  repository: ghcr.io/your-org/openresidency
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3000

config:
  publicBaseUrl: https://id.example.gov
  countryConfigDir: /app/config/countries
  rateLimitPerMinute: "120"

# Provide these via `--set-string` or a values file kept out of version control,
# or reference an existing secret with existingSecret.
secrets:
  existingSecret: "" # if set, envFrom uses this secret and the values below are ignored
  databaseUrl: "postgresql://openres:CHANGE_ME@postgres:5432/openres?schema=public"
  subjectPepper: "CHANGE_ME_STRONG_RANDOM"
  oidcCookieSecret: "CHANGE_ME_COOKIE"
  adminApiKey: "CHANGE_ME_ADMIN_KEY"
  ussdGatewaySecret: "CHANGE_ME_USSD_SECRET" # shared secret for the USSD webhook
  # Only for contactDirectory.mode: encrypted. openssl rand -hex 32.
  contactEncryptionKey: ""
  # Extra secrets passed straight through as environment variables: messaging aggregator
  # credentials (AFRICASTALKING_API_KEY, TERMII_API_KEY, TWILIO_*), foundational provider
  # keys (NIN_GATEWAY_KEY), and operator bootstrap for operatorAuth.mode: local.
  extraEnv: {}
  issuerPrivateJwk: "" # leave empty to source from KMS at runtime
  # One entry per relying party across all loaded country configs, keyed by client id.
  # The app refuses to start if any configured RP is missing its secret, rather than fall
  # back to a placeholder derived from the public client id. Rendered as <ID>_CLIENT_SECRET.
  relyingPartySecrets:
    health: "CHANGE_ME_HEALTH_SECRET"
    tax: "CHANGE_ME_TAX_SECRET"
    permits: "CHANGE_ME_PERMITS_SECRET"
    subsidy: "CHANGE_ME_SUBSIDY_SECRET"

migrations:
  enabled: true

ingress:
  enabled: true
  className: nginx
  host: id.example.gov
  tlsSecret: openresidency-tls
  rateLimitPerMinute: "120"
  clusterIssuer: letsencrypt-prod

resources:
  requests: { cpu: 100m, memory: 192Mi }
  limits: { cpu: 500m, memory: 512Mi }
