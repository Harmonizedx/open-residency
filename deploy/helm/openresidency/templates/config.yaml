apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openresidency.name" . }}-config
  labels: {{- include "openresidency.labels" . | nindent 4 }}
data:
  PUBLIC_BASE_URL: {{ .Values.config.publicBaseUrl | quote }}
  COUNTRY_CONFIG_DIR: {{ .Values.config.countryConfigDir | quote }}
  RATE_LIMIT_PER_MINUTE: {{ .Values.config.rateLimitPerMinute | quote }}
{{- if not .Values.secrets.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openresidency.name" . }}-secrets
  labels: {{- include "openresidency.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  SUBJECT_PEPPER: {{ .Values.secrets.subjectPepper | quote }}
  OIDC_COOKIE_SECRET: {{ .Values.secrets.oidcCookieSecret | quote }}
  ADMIN_API_KEY: {{ .Values.secrets.adminApiKey | quote }}
  USSD_GATEWAY_SECRET: {{ .Values.secrets.ussdGatewaySecret | quote }}
{{- if .Values.secrets.contactEncryptionKey }}
  CONTACT_ENCRYPTION_KEY: {{ .Values.secrets.contactEncryptionKey | quote }}
{{- end }}
{{- range $name, $value := .Values.secrets.extraEnv }}
  {{ $name }}: {{ $value | quote }}
{{- end }}
{{- range $clientId, $secret := .Values.secrets.relyingPartySecrets }}
  {{ upper $clientId }}_CLIENT_SECRET: {{ $secret | quote }}
{{- end }}
{{- if .Values.secrets.issuerPrivateJwk }}
  ISSUER_PRIVATE_JWK: {{ .Values.secrets.issuerPrivateJwk | quote }}
{{- end }}
{{- end }}
