---
apiVersion: v1
kind: Namespace
metadata:
  name: openresidency
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openresidency-config
  namespace: openresidency
data:
  PUBLIC_BASE_URL: "https://id.example.gov"
  COUNTRY_CONFIG_DIR: "/app/config/countries"
  RATE_LIMIT_PER_MINUTE: "120"
---
# Example only. In production, source these from a sealed secret / external secrets
# operator / cloud KMS, never commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: openresidency-secrets
  namespace: openresidency
type: Opaque
stringData:
  DATABASE_URL: "postgresql://openres:CHANGE_ME@postgres:5432/openres?schema=public"
  SUBJECT_PEPPER: "CHANGE_ME_STRONG_RANDOM"
  OIDC_COOKIE_SECRET: "CHANGE_ME_COOKIE"
  ADMIN_API_KEY: "CHANGE_ME_ADMIN_KEY"
  # Shared secret the USSD aggregator returns on webhook callbacks. The route fails
  # closed without it.
  USSD_GATEWAY_SECRET: "CHANGE_ME_USSD_SECRET"
  # Encrypts residents' phone numbers at rest (contactDirectory.mode: encrypted).
  # Prefer contactDirectory.mode: external where a contact service already exists, and
  # then drop this entirely -- no recoverable number is stored here at all.
  # CONTACT_ENCRYPTION_KEY: "CHANGE_ME_openssl_rand_hex_32"
  # Messaging aggregator credential. Set the pair your `messaging.provider` needs.
  # AFRICASTALKING_API_KEY: "CHANGE_ME"
  # TERMII_API_KEY: "CHANGE_ME"
  # Foundational provider secret, named by foundational.auth.secretEnv in the config.
  # NIN_GATEWAY_KEY: "CHANGE_ME_NIMC_GATEWAY_KEY"
  # One per relying party across all loaded country configs. The app refuses to start if
  # any is missing rather than fall back to a placeholder derived from the public client
  # id. Add or remove lines to match your configs.
  HEALTH_CLIENT_SECRET: "CHANGE_ME_HEALTH_SECRET"
  TAX_CLIENT_SECRET: "CHANGE_ME_TAX_SECRET"
  PERMITS_CLIENT_SECRET: "CHANGE_ME_PERMITS_SECRET"
  SUBSIDY_CLIENT_SECRET: "CHANGE_ME_SUBSIDY_SECRET"
  # ISSUER_PRIVATE_JWK sourced from KMS in production:
  # ISSUER_PRIVATE_JWK: '{"kty":"OKP","crv":"Ed25519","x":"...","d":"..."}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openresidency
  namespace: openresidency
  labels: { app: openresidency }
spec:
  replicas: 2
  selector:
    matchLabels: { app: openresidency }
  template:
    metadata:
      labels: { app: openresidency }
    spec:
      containers:
        - name: app
          image: ghcr.io/your-org/openresidency:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: openresidency-config }
            - secretRef: { name: openresidency-secrets }
          readinessProbe:
            httpGet: { path: /residency/countries, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /residency/countries, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
      # Run DB migrations before the app starts serving.
      initContainers:
        - name: migrate
          image: ghcr.io/your-org/openresidency:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef: { name: openresidency-secrets }
---
apiVersion: v1
kind: Service
metadata:
  name: openresidency
  namespace: openresidency
spec:
  selector: { app: openresidency }
  ports:
    - port: 80
      targetPort: 3000
